<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>签到中心 — USS</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="checkin-page.css">
    <link rel="icon" href="/favicon.ico" sizes="48x48">
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <script src="auth-config.js"></script>
</head>
<body class="checkin-page-body">
    <header class="checkin-page-nav">
        <a class="checkin-nav-home" href="index.html">返回首页</a>
    </header>

    <main class="checkin-page-main checkin-page-main--hub">
        <div id="checkinGateHint" class="checkin-gate-hint" hidden>
            <p>请先登录再使用签到。</p>
            <p><a href="index.html">去首页登录</a></p>
        </div>

        <div id="checkinHubMain" hidden>
            <header class="checkin-hub-hero">
                <h1 class="checkin-hub-page-title">签到中心</h1>
                <p class="checkin-hub-lead">各分部总积分与连续天数互不影响，点击卡片进入对应分部。</p>
            </header>
            <div id="checkinHubCards" class="checkin-hub-cards"></div>

            <section class="checkin-points-section" aria-label="积分系统">
                <h2 class="checkin-points-heading">积分系统</h2>
                <p class="checkin-points-lead">使用签到积分兑换奖励或参与抽奖</p>
                <div class="checkin-points-cards">
                    <a href="points-mall.html" class="checkin-points-card">
                        <span class="checkin-points-card-title">积分商城</span>
                        <span class="checkin-points-card-desc">浏览可兑换商品与舰队奖励</span>
                    </a>
                    <a href="points-exchange.html" class="checkin-points-card">
                        <span class="checkin-points-card-title">积分兑换</span>
                        <span class="checkin-points-card-desc">使用签到积分兑换指定奖励</span>
                    </a>
                    <a href="points-lottery.html" class="checkin-points-card">
                        <span class="checkin-points-card-title">积分抽奖</span>
                        <span class="checkin-points-card-desc">消耗积分参与舰队抽奖活动</span>
                    </a>
                </div>
            </section>

            <noscript>
                <div class="checkin-hub-cards">
                    <a class="checkin-hub-card" href="checkin-unit.html#unit=hq">总部（开 JavaScript 可看实时总积分）</a>
                    <a class="checkin-hub-card" href="checkin-unit.html#unit=squad1">一中队</a>
                    <a class="checkin-hub-card" href="checkin-unit.html#unit=uss">USS创伤舰队</a>
                    <a class="checkin-hub-card" href="checkin-unit.html#unit=ussprod">USS生产队</a>
                </div>
            </noscript>
            <p id="checkinHubError" class="checkin-hub-error" hidden></p>
        </div>
    </main>

    <script src="api-error.js"></script>
    <script src="auth-api.js"></script>
    <script src="auth-session-sync.js"></script>
    <script src="checkin-hub.js"></script>
    <script src="site-footer.js"></script>
</body>
</html>
