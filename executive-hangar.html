<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行政机库 · USS</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="executive-hangar.css">
    <link rel="icon" type="image/jpeg" href="fleet-logo.jpg">
</head>
<body class="points-subpage-body exec-hangar-body">
    <header class="site-header">
    <div class="navbar-top" role="banner" aria-label="舰队标识">
        <span class="navbar-top-brand">UMBRELLA FLEET</span>
    </div>
    <nav class="navbar">
        <div class="navbar-start">
        <div class="logo">
            <a href="index.html" aria-label="首页"><img src="fleet-logo.jpg" alt="舰队 LOGO" decoding="async"></a>
        </div>
        <div class="nav-links" role="navigation" aria-label="站点导航">
            <div class="nav-dropdown">
                <button type="button" class="nav-dropdown-toggle" aria-expanded="false" aria-haspopup="true" data-mega-target="navMegaPoints" aria-controls="navMegaPoints">
                    积分系统
                    <span class="nav-dropdown-caret" aria-hidden="true"></span>
                </button>
            </div>
            <div class="nav-dropdown">
                <button type="button" class="nav-dropdown-toggle" aria-expanded="false" aria-haspopup="true" data-mega-target="navMegaHangar" aria-controls="navMegaHangar">
                    行政机库
                    <span class="nav-dropdown-caret" aria-hidden="true"></span>
                </button>
            </div>
        </div>
        </div>
        <div class="nav-right">
            <a href="index.html" class="nav-item">返回首页</a>
        </div>
    </nav>
    <div id="navMegaPoints" class="nav-mega-panel" role="region" aria-label="积分系统" hidden>
        <div class="nav-mega-inner">
            <div class="nav-mega-col">
                <p class="nav-mega-heading">积分服务</p>
                <ul class="nav-mega-list">
                    <li><a href="points-mall.html" class="nav-mega-link"><span class="nav-mega-link-title">积分商城</span><span class="nav-mega-link-desc">浏览可兑换商品与舰队奖励</span></a></li>
                    <li><a href="points-exchange.html" class="nav-mega-link"><span class="nav-mega-link-title">积分兑换</span><span class="nav-mega-link-desc">使用签到积分兑换指定奖励</span></a></li>
                    <li><a href="points-lottery.html" class="nav-mega-link"><span class="nav-mega-link-title">积分抽奖</span><span class="nav-mega-link-desc">消耗积分参与舰队抽奖活动</span></a></li>
                </ul>
            </div>
        </div>
    </div>
    <div id="navMegaHangar" class="nav-mega-panel" role="region" aria-label="行政机库" hidden>
        <div class="nav-mega-inner">
            <div class="nav-mega-col">
                <p class="nav-mega-heading">行政机库</p>
                <ul class="nav-mega-list">
                    <li><a href="executive-hangar.html" class="nav-mega-link is-current"><span class="nav-mega-link-title">进入行政机库</span><span class="nav-mega-link-desc">Pyro 行政机库周期与插卡窗口</span></a></li>
                </ul>
            </div>
        </div>
    </div>
    </header>

    <main class="exec-hangar-main">
        <div id="execHangarError" class="exec-hangar-error is-hidden" role="alert"></div>

        <section id="execHangarBoard" class="exec-console" aria-live="polite">
            <div class="exec-console-frame" aria-hidden="true"></div>

            <nav class="exec-phase-rail" id="execPhaseRail" aria-label="周期四阶段">
                <div class="exec-phase-node" data-phase="charging">
                    <span class="exec-phase-dot"></span>
                    <span class="exec-phase-name">充电</span>
                    <span class="exec-phase-sub">0–120′</span>
                </div>
                <div class="exec-phase-node" data-phase="access">
                    <span class="exec-phase-dot"></span>
                    <span class="exec-phase-name">可插卡</span>
                    <span class="exec-phase-sub">12′</span>
                </div>
                <div class="exec-phase-node" data-phase="discharge">
                    <span class="exec-phase-dot"></span>
                    <span class="exec-phase-name">放电</span>
                    <span class="exec-phase-sub">48′</span>
                </div>
                <div class="exec-phase-node" data-phase="cooldown">
                    <span class="exec-phase-dot"></span>
                    <span class="exec-phase-name">冷却</span>
                    <span class="exec-phase-sub">5′</span>
                </div>
            </nav>

            <div class="exec-insert-banner" id="execInsertBanner" data-state="no">
                <span class="exec-insert-icon" aria-hidden="true"></span>
                <span class="exec-insert-text" id="execInsertText">不可插卡</span>
            </div>

            <div class="exec-hero">
                <p class="exec-hero-kicker">距本轮结束 · 185 分钟周期</p>
                <div class="exec-hero-clock" id="execHeroClock" aria-label="距本轮结束还剩">
                    <span class="exec-clock-seg"><b id="execRemH">00</b><i>h</i></span>
                    <span class="exec-clock-colon">:</span>
                    <span class="exec-clock-seg"><b id="execRemM">00</b><i>m</i></span>
                    <span class="exec-clock-colon">:</span>
                    <span class="exec-clock-seg"><b id="execRemS">00</b><i>s</i></span>
                </div>
                <div class="exec-hero-meta">
                    <div class="exec-meta-chip">
                        <span class="exec-meta-label">本轮已进行</span>
                        <span class="exec-meta-value" id="execElapsedHero">—</span>
                    </div>
                    <div class="exec-meta-chip">
                        <span class="exec-meta-label" id="execPhaseRemainLabel">当前阶段还剩</span>
                        <span class="exec-meta-value" id="execPhaseRemainHero">—</span>
                    </div>
                    <div class="exec-meta-chip">
                        <span class="exec-meta-label" id="execNextAccessLabel">距下次插卡窗口</span>
                        <span class="exec-meta-value" id="execNextAccessHero">—</span>
                    </div>
                </div>
            </div>

            <div class="exec-reactor">
                <p class="exec-reactor-label">PIPELINE STATUS · <span id="execLedCount">0 / 5</span></p>
                <div class="exec-led-strip" id="execLedStrip" aria-label="五盏指示灯"></div>
            </div>

            <div class="exec-cycle-track-wrap">
                <div class="exec-cycle-track">
                    <div class="exec-cycle-seg exec-cycle-seg--charge" style="flex:120" title="充电 120min"></div>
                    <div class="exec-cycle-seg exec-cycle-seg--access" style="flex:12" title="可插卡 12min"></div>
                    <div class="exec-cycle-seg exec-cycle-seg--discharge" style="flex:48" title="放电 48min"></div>
                    <div class="exec-cycle-seg exec-cycle-seg--cooldown" style="flex:5" title="冷却 5min"></div>
                    <div class="exec-cycle-marker" id="execCycleMarker" aria-hidden="true"></div>
                </div>
                <div class="exec-cycle-legend">
                    <span>0</span><span>120</span><span>132</span><span>180</span><span>185 min</span>
                </div>
            </div>
        </section>
    </main>

    <script src="auth-config.js"></script>
    <script src="nav-dropdown.js"></script>
    <script src="executive-hangar-timer.js"></script>
</body>
</html>
