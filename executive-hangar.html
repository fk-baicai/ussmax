    <main class="exec-hangar-main">
        <div id="execHangarError" class="exec-hangar-error is-hidden" role="alert"></div>

        <section id="execHangarBoard" class="exec-console" aria-live="polite">
            <div class="exec-console-frame" aria-hidden="true"></div>

            <nav class="exec-phase-rail" id="execPhaseRail" aria-label="周期三阶段">
                <div class="exec-phase-node" data-phase="charging">
                    <span class="exec-phase-dot"></span>
                    <span class="exec-phase-name">充电</span>
                    <span class="exec-phase-sub">0–120′</span>
                </div>
                <div class="exec-phase-node" data-phase="discharge">
                    <span class="exec-phase-dot"></span>
                    <span class="exec-phase-name">放电</span>
                    <span class="exec-phase-sub">120–180′</span>
                </div>
                <div class="exec-phase-node" data-phase="cooldown">
                    <span class="exec-phase-dot"></span>
                    <span class="exec-phase-name">冷却</span>
                    <span class="exec-phase-sub">5′</span>
                </div>
            </nav>

            <div class="exec-insert-banner" id="execInsertBanner" data-state="no">
                <span class="exec-insert-icon" aria-hidden="true"></span>
                <span class="exec-insert-text" id="execInsertText">不可插卡</span>
            </div>

            <div class="exec-hero">
                <p class="exec-hero-kicker">距本轮结束 · 185 分钟周期</p>
                <div class="exec-hero-clock" id="execHeroClock" aria-label="距本轮结束还剩">
                    <span class="exec-clock-seg"><b id="execRemH">00</b><i>h</i></span>
                    <span class="exec-clock-colon">:</span>
                    <span class="exec-clock-seg"><b id="execRemM">00</b><i>m</i></span>
                    <span class="exec-clock-colon">:</span>
                    <span class="exec-clock-seg"><b id="execRemS">00</b><i>s</i></span>
                </div>
                <div class="exec-hero-meta">
                    <div class="exec-meta-chip">
                        <span class="exec-meta-label">本轮已进行</span>
                        <span class="exec-meta-value" id="execElapsedHero">—</span>
                    </div>
                    <div class="exec-meta-chip">
                        <span class="exec-meta-label" id="execPhaseRemainLabel">当前阶段还剩</span>
                        <span class="exec-meta-value" id="execPhaseRemainHero">—</span>
                    </div>
                    <div class="exec-meta-chip">
                        <span class="exec-meta-label" id="execNextAccessLabel">距下次插卡窗口</span>
                        <span class="exec-meta-value" id="execNextAccessHero">—</span>
                    </div>
                </div>
            </div>

            <div class="exec-reactor">
                <p class="exec-reactor-label">PIPELINE STATUS · <span id="execLedCount">0 / 5</span></p>
                <div class="exec-led-strip" id="execLedStrip" aria-label="五盏指示灯"></div>
            </div>

            <div class="exec-cycle-track-wrap">
                <div class="exec-cycle-track">
                    <div class="exec-cycle-seg exec-cycle-seg--charge" style="flex:120" title="充电 120min"></div>
                    <div class="exec-cycle-seg exec-cycle-seg--discharge" style="flex:60" title="放电 120–180min（全程可插卡）"></div>
                    <div class="exec-cycle-seg exec-cycle-seg--cooldown" style="flex:5" title="冷却 5min"></div>
                    <div class="exec-cycle-marker" id="execCycleMarker" aria-hidden="true"></div>
                </div>
                <div class="exec-cycle-legend">
                    <span>0</span><span>120</span><span class="exec-cycle-legend-mark">132</span><span>180</span><span>185 min</span>
                </div>
            </div>

            <div class="exec-phase-info" aria-label="周期三阶段说明">
                <button type="button" class="exec-phase-info-card" data-phase="charging" aria-pressed="false">
                    <span class="exec-phase-info-head">
                        <span class="exec-phase-info-dot"></span>
                        <span class="exec-phase-info-title">充电阶段</span>
                        <span class="exec-phase-info-time">0 – 120 min</span>
                    </span>
                    <span class="exec-phase-info-desc">每 24 分钟亮 1 盏绿灯，依次点亮 5 盏。全程不可插卡。</span>
                    <span class="exec-phase-info-extra">节点：0 → 24 → 48 → 72 → 96 → 120 min 五盏依次变绿</span>
                </button>
                <button type="button" class="exec-phase-info-card" data-phase="discharge" aria-pressed="false">
                    <span class="exec-phase-info-head">
                        <span class="exec-phase-info-dot"></span>
                        <span class="exec-phase-info-title">放电阶段</span>
                        <span class="exec-phase-info-time">120 – 180 min</span>
                    </span>
                    <span class="exec-phase-info-desc">120 分起 5 盏全绿，每 12 分钟熄灭 1 盏绿灯。全程可插卡。</span>
                    <span class="exec-phase-info-extra">熄灭节点：132 → 144 → 156 → 168 → 180 min</span>
                </button>
                <button type="button" class="exec-phase-info-card" data-phase="cooldown" aria-pressed="false">
                    <span class="exec-phase-info-head">
                        <span class="exec-phase-info-dot"></span>
                        <span class="exec-phase-info-title">冷却阶段</span>
                        <span class="exec-phase-info-time">180 – 185 min</span>
                    </span>
                    <span class="exec-phase-info-desc">持续 5 分钟，随后进入新一轮充电。</span>
                    <span class="exec-phase-info-extra">不可插卡 · 185 min 整轮结束</span>
                </button>
            </div>
        </section>
    </main>
