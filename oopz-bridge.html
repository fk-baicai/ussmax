<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OOPZ 机器人桥接 · USS</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="oopz-bridge.css">
    <link rel="icon" href="/favicon.ico" sizes="48x48">
    <script src="auth-config.js"></script>
</head>
<body class="oopz-bridge-body">
    <main class="oopz-bridge-main">
        <a class="oopz-bridge-back" href="index.html#oopz-bridge-section">← 返回首页</a>

        <header class="oopz-bridge-hero">
            <h1 class="oopz-bridge-title">OOPZ 机器人桥接</h1>
            <p class="oopz-bridge-lead">展示已接入机器人的 OOPZ 语音频道及当前在线成员；成员进入频道时会生成语音播报并同步到此页。</p>
        </header>

        <p id="oopzBridgeError" class="oopz-bridge-error" hidden></p>

        <div class="oopz-bridge-status" aria-live="polite">
            <span id="oopzBridgeStatusDot" class="oopz-bridge-status-dot" aria-hidden="true"></span>
            <span id="oopzBridgeStatusText" class="oopz-bridge-status-text">连接中…</span>
            <span id="oopzBridgeStatusMeta" class="oopz-bridge-status-meta"></span>
        </div>

        <div class="oopz-bridge-grid">
            <section class="oopz-bridge-panel" aria-labelledby="oopzBridgeChannelsTitle">
                <h2 id="oopzBridgeChannelsTitle" class="oopz-bridge-panel-title">频道与成员</h2>
                <div id="oopzBridgeChannels">
                    <p class="oopz-bridge-empty">加载中…</p>
                </div>
            </section>

            <section class="oopz-bridge-panel" aria-labelledby="oopzBridgeLogsTitle">
                <h2 id="oopzBridgeLogsTitle" class="oopz-bridge-panel-title">日志</h2>
                <div id="oopzBridgeLogs">
                    <p class="oopz-bridge-empty">加载中…</p>
                </div>
            </section>
        </div>
    </main>

    <script src="oopz-bridge.js"></script>
    <script src="site-footer.js"></script>
</body>
</html>
