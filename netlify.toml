# Netlify base directory: frontend
# Proxy API requests to backend (HTTPS site cannot call http://IP directly)

[build]
  publish = "."

[[redirects]]
  from = "/api/*"
  to = "http://8.138.237.183:3789/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/avatars/*"
  to = "http://8.138.237.183:3789/avatars/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/community-uploads/*"
  to = "http://8.138.237.183:3789/community-uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/captcha/*"
  to = "http://8.138.237.183:3789/captcha/:splat"
  status = 200
  force = true
