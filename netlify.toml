# Netlify base directory: frontend
# Proxy API requests to backend (HTTPS site cannot call http://IP directly)
#
# === API зӣҙиҝһпјҲе·ІеҗҜз”Ёпј?==
# еүҚз«Ҝ auth-config.js з”ҹдә§зҺҜеўғй»ҳи®ӨиҜ·жұӮ https://api.ussxc.org
# дёӢж–№ /api /avatars еҸҚд»Јдҝқз•ҷдҪңе…ңеә•пјҲжң¬ең°йў„и§ҲжҲ–жңӘй…?SSL ж—¶пјү
# йҳҝйҮҢдә‘йңҖпјҡdeploy/nginx-api.conf + certbot + backend/.env TRUST_PROXY_HOPS=1

[build]
  publish = "."

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/api/*"
  to = "http://8.138.237.183:3789/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/avatars/*"
  to = "http://8.138.237.183:3789/avatars/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/community-uploads/*"
  to = "http://8.138.237.183:3789/community-uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/captcha/*"
  to = "http://8.138.237.183:3789/captcha/:splat"
  status = 200
  force = true
