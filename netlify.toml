# Netlify Base directory = frontend 时使用此文件（publish = "." 即本目录）
# 若 Base directory 留空，以仓库根 netlify.toml（publish = "frontend"）为准

[build]
  publish = "."

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/oopz-bridge.html"
  to = "/index.html#oopz-bridge-section"
  status = 301

[[redirects]]
  from = "/api/*"
  to = "http://8.138.237.183:3789/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/avatars/*"
  to = "http://8.138.237.183:3789/avatars/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/community-uploads/*"
  to = "http://8.138.237.183:3789/community-uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/captcha/*"
  to = "http://8.138.237.183:3789/captcha/:splat"
  status = 200
  force = true
